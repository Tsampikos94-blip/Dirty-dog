<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Το Μαγαζί Μου</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #e63946;
      padding: 25px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .container {
      padding: 20px;
    }

    .menu {
      background: #222;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      max-width: 400px;
    }

    .btn {
      display: inline-block;
      background: #e63946;
      color: white;
      padding: 12px 20px;
      margin-top: 10px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    footer {
      margin-top: 30px;
      padding: 15px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 Το Μαγαζί Μου</h1>
  <p>Hot Dog • Burger • Snacks</p>
</header>

<div class="container">

  <div class="menu">
    <h2>🌭 Hot Dog</h2>
    <p>Κλασικό Hot Dog - 2.50€</p>
    <p>Special Hot Dog - 3.50€</p>
  </div>

  <div class="menu">
    <h2>🍔 Burgers</h2>
    <p>Classic Burger - 4.00€</p>
    <p>Cheese Burger - 4.50€</p>
  </div>

  <div class="menu">
    <h2>📲 Παραγγελία</h2>
    <p>Σκάναρε το QR και παρήγγειλε άμεσα</p>

    <!-- Βάλε εδώ το QR σου -->
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://example.com" 
         alt="QR Code">

    <br>
    <a class="btn" href="tel:+3069XXXXXXXX">📞 Τηλέφωνο</a>
  </div>

</div>

<footer>
  © 2026 Το Μαγαζί Μου - Όλα τα δικαιώματα
</footer>

</body>
</html>
